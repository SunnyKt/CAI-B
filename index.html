<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Yume · 歡迎</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 62.5%; width: 100%; height: 100%; overflow: hidden; background: #E8F5F4; }

body {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: #E8F5F4;
  font-family: 'Noto Sans TC', sans-serif;
}

.phone {
  width: 100vw; height: 100vh;
  overflow: hidden;
  position: relative;
  background: #F4F8FA;
  box-shadow: 0 0 0 1.5px rgba(0,161,155,0.2), 0 0 0 3px rgba(0,161,155,0.08), 0 40px 80px rgba(0,100,90,0.18);
  flex-shrink: 0;
}


.starfield {
  width: 100%; height: 100%;
  position: absolute; inset: 0;
  opacity: 0;
  animation: stars-fade 1.2s ease-out 1.0s forwards;
  pointer-events: none;
}

/* ── 頁面淡出遮罩 Page Fade-out Overlay ── */
#pageOverlay {
  position: absolute;
  inset: 0;
  z-index: 999;
  background: #F4F8FA;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.7s ease;
}
#pageOverlay.is-fading {
  opacity: 1;
  pointer-events: auto;
}


/* ═══════════════════════════════════════════════════
   LAYER 1 — Top Bar / 頂部導航
   ═══════════════════════════════════════════════════ */
#topBar {
  position: absolute;
  top: 0; left: 0; width: 100%;
  z-index: 10;
  padding-top: max(20px, env(safe-area-inset-top));
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}
#topBar.is-visible { opacity: 1; pointer-events: auto; }

.top-bar__nav {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; height: 5rem;
  padding: 0.8rem 1.6rem;
  background: #ffffff;
  box-shadow: 0px 10px 4px 0px rgba(0,161,155,0.05);
  flex-shrink: 0;
}
.top-bar__logo { width: 14.5rem; height: 2.96rem; flex-shrink: 0; }
.top-bar__logo img { width: 100%; height: 100%; object-fit: contain; display: block; }
.top-bar__btn-group { display: flex; align-items: center; }
.top-bar__btn {
  display: flex; align-items: center; justify-content: center;
  width: 4.4rem; height: 4.4rem;
  background: none; border: none; cursor: pointer; padding: 0; flex-shrink: 0;
}
.top-bar__btn img { width: 100%; height: 100%; object-fit: contain; display: block; }

.top-bar__announce {
  display: flex; align-items: center;
  width: 100%; height: 3.8rem;
  padding-left: 1.5rem;
  border-top: 1px solid #bde3e2;
  border-bottom: 1px solid #bde3e2;
  background: #ffffff;
  overflow: hidden; flex-shrink: 0;
}
.top-bar__announce-text {
  font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
  font-weight: 700; font-size: 1.6rem; color: #1c1c1c;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.top-bar__announce-link { text-decoration: underline; text-decoration-skip-ink: none; color: #1c1c1c; }


/* ═══════════════════════════════════════════════════
   LAYER 2 — Top Menu Overlay / 模糊遮罩
   ═══════════════════════════════════════════════════ */
.top-menu-overlay {
  position: absolute;
  top: 8.8rem; left: 0; width: 100%; bottom: 0;
  z-index: 20;
  background: linear-gradient(
    179.946deg,
    rgb(166, 237, 220)        0%,
    rgb(242, 246, 244)        60.846%,
    rgba(255, 255, 255, 0.2)  91.506%
  );
  backdrop-filter: blur(0px);
  -webkit-backdrop-filter: blur(0px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.45s ease, backdrop-filter 0.55s ease, -webkit-backdrop-filter 0.55s ease;
}
.top-menu-overlay.is-open {
  opacity: 0.4;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  pointer-events: auto;
}


/* ═══════════════════════════════════════════════════
   LAYER 3 — Top Menu / 資訊選單
   ═══════════════════════════════════════════════════ */
.top-menu {
  position: absolute;
  top: 8.8rem; right: 0; width: 100%;
  padding: 4rem 4rem 0;
  display: flex; flex-direction: column; align-items: center; gap: 2.4rem;
  z-index: 30;
  opacity: 0;
  transform: translateY(-3.2rem);
  pointer-events: none;
  transition: opacity 0.42s cubic-bezier(0.16, 1, 0.3, 1),
              transform 0.42s cubic-bezier(0.16, 1, 0.3, 1);
}
.top-menu.is-open { opacity: 1; transform: translateY(0); pointer-events: auto;}

.top-menu__card {
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.8) 0%, rgba(255, 255, 255, 0.4) 100%);
  border: 1px solid #FFFFFF;
  box-shadow: 0px 30px 40px rgba(69, 197, 181, 0.3);
  backdrop-filter: blur(35px);

  width: 100%;
  /* background-color: #ffffff;
  box-shadow: 0px 0px 4px 0px rgba(25,112,108,0.4); */
  border-radius: 1.6rem;
  border-top: 0.5px solid #85d0ce;
  overflow: hidden;
}
.top-menu__item { display: flex; align-items: center; gap: 1.2rem; padding: 1.2rem 2rem; width: 100%; }
.top-menu__item--bordered { border-top: 1px solid #e1efef; }
.top-menu__item-icon { width: 2rem; height: 2rem; flex-shrink: 0; display: block; object-fit: contain; }
.top-menu__item-text {
  font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
  font-weight: 600; font-size: 1.6rem; color: #1c1c1c; flex: 1; line-height: 1.5;
}
.top-menu__privacy {
  padding: 0rem 3rem 4rem 5.3rem;
  font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
  font-size: 1.6rem; color: #1c1c1c; line-height: 1.5;
}
.top-menu__link { color: #0f62fe; font-weight: 700; text-decoration: underline; text-decoration-skip-ink: none; }

.top-menu__close-btn {
  display: flex; align-items: center; justify-content: center;
  background-color: #ffffff;
  border: none; border-radius: 2.6rem;
  box-shadow: 0px 0px 8.625px 0px rgba(67,67,67,0.2);
  padding: 0.7rem;
  cursor: pointer;
  transition: background-color 0.15s ease;
}
.top-menu__close-btn:hover { background-color: rgba(0,0,0,0.04); }
.top-menu__close-icon { width: 3.2rem; height: 3.2rem; display: block; object-fit: scale-down; }


/* ═══════════════════════════════════════════════════
   LAYER 4 — Login Invite / 驗身邀請遮罩
   ═══════════════════════════════════════════════════ */
#loginInvite {
  position: absolute;
  inset: 0;
  z-index: 40;
  /* background: linear-gradient(
    179.95deg,
    rgb(166, 237, 220)        0%,
    rgb(242, 246, 244)        60.85%,
    rgba(255, 255, 255, 0.2)  91.5%
  ); */
  background: linear-gradient(
    179.95deg,
    rgb(166, 237, 220, 1)        0%,
    rgb(242, 246, 244, 1)        60.85%,
    rgba(255, 255, 255, 0)  92.5%
  );
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.45s ease;
}
#loginInvite.is-visible { opacity: 1; pointer-events: auto; margin-top: 50px;}

/* X 關閉按鈕 */
.login-close {
  position: absolute;
  top: 5.6rem; right: 1.8rem;
  width: 4.4rem; height: 4.4rem;
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer; padding: 0;
}

/* 邀請主體 */
.login-invite__body {
  position: absolute;
  top: 46%;
  left: 50%;
  transform: translate(-50%, -58%);
  width: 31.5rem;
  display: flex; flex-direction: column; align-items: center; gap: 1.0rem;
}

.login-invite__title {
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 300;
  font-size: 2.7rem;
  color: #1c1c1c;
  text-align: center;
  line-height: 1.6;
  margin-bottom: 0.8rem;
}

/* ID 輸入區 */
.login-invite__input-wrap {
  width: 22.4rem;
  display: flex; flex-direction: column;
  align-items: center; gap: 1.0rem;
}
.login-invite__label {
  font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
  font-weight: 700; font-size: 1.6rem;
  color: #1c1c1c; text-align: center; width: 100%;
}
.login-invite__input {
  width: 100%;
  border: none;
  border-bottom: 1px solid #acacac;
  background: transparent;
  font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
  font-size: 1.6rem; color: #1c1c1c;
  padding: 0.6rem 0;
  outline: none;
  text-transform: uppercase;
  text-align: center;
  letter-spacing: 0.08em;
}
.login-invite__input::placeholder { color: #acacac; text-transform: none; letter-spacing: 0; }

/* 操作按鈕 */
.login-invite__btns {
  display: flex; gap: 1.2rem;
  margin-top: 0.8rem;
}
.login-btn {
  display: flex; align-items: center; justify-content: center;
  width: 10.4rem; height: 4.4rem;
  border-radius: 4rem;
  font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
  font-weight: 700; font-size: 1.6rem;
  cursor: pointer; border: none;
  transition: opacity 0.15s ease;
}
.login-btn:active { opacity: 0.75; }
.login-btn--cancel {
  background: #f0f0f0;
  border: 1px solid #dfdfdf;
  color: #7c7c7c;
  box-shadow: 0px 4px 16px rgba(0,0,0,0.05), 0px 0px 4px rgba(90,125,188,0.27);
}
.login-btn--confirm {
  background: #cbe9e9;
  border: 0.5px solid #85d0ce;
  color: #005154;
  box-shadow: 0px 4px 16px rgba(90,125,188,0.05), 0px 0px 4px rgba(25,112,108,0.27);
}


/* ═══════════════════════════════════════════════════
   LAYER 5 — Splash / 開場畫面
   ═══════════════════════════════════════════════════ */
.splash {
  position: absolute; inset: 0;
  background: linear-gradient(
    160deg,
    rgba(244, 248, 250, 0.94) 0%,
    rgba(240, 250, 248, 0.92) 45%,
    rgba(249, 242, 226, 0.88) 100%
  );
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 50;
  overflow: hidden;
  cursor: pointer; user-select: none;
  transition: opacity 0.55s ease;
}

.av-stage {
  position: relative;
  width: 260px; height: 260px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 48px;
  overflow: visible;
}

.copy-block {
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
  opacity: 0;
  animation: copy-in 1.0s cubic-bezier(0.16,1,0.3,1) 4.0s forwards;
}
.copy-name {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 400;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(0,130,120,0.65);
}
.copy-tagline {
  font-size: 17px; font-weight: 300;
  color: #0D2421;
  letter-spacing: 0.04em;
  text-align: center; line-height: 1.6;
}
.copy-tagline strong { font-weight: 500; color: #00A19B; }
.copy-sub { font-size: 12px; color: rgba(13,36,33,0.38); letter-spacing: 0.05em; margin-top: 4px; }

.tap-hint {
  position: absolute;
  bottom: 56px; left: 50%; transform: translateX(-50%);
  font-family: 'DM Sans', sans-serif; font-size: 12px;
  color: rgba(0,100,90,0.45); letter-spacing: 0.1em;
  white-space: nowrap;
  opacity: 0;
  animation: copy-in 0.7s ease 5.0s forwards;
  pointer-events: none;
}


/* ═══════════════════════════════════════════════════
   Keyframes
   ═══════════════════════════════════════════════════ */
@keyframes stars-fade { from{opacity:0} to{opacity:1} }
@keyframes copy-in {
  from { opacity:0; transform:translateY(12px) }
  to   { opacity:1; transform:translateY(0) }
}
@keyframes core-birth {
  0%  { transform:scale(0); opacity:0 }
  40% { transform:scale(1.4); opacity:1 }
  65% { transform:scale(0.85) }
  100%{ transform:scale(1); opacity:1 }
}
@keyframes core-pulse { 0%,100%{fill:#00A19B} 50%{fill:#00D4CE} }
@keyframes dot-birth {
  0%  { transform:scale(0); opacity:0 }
  60% { transform:scale(1.3); opacity:1 }
  100%{ transform:scale(1); opacity:1 }
}
@keyframes ring-expand-1 {
  0%  { transform:scale(0); opacity:0 }
  50% { opacity:var(--op-hi,0.3) }
  100%{ transform:scale(1); opacity:var(--op-lo,0.1) }
}
@keyframes ring-breathe { 0%,100%{opacity:var(--op-lo,.1)} 50%{opacity:var(--op-hi,.28)} }
@keyframes ring-scale   { 0%,100%{transform:scale(1)} 50%{transform:scale(1.22)} }
@keyframes border-birth {
  0%  { transform:scale(0) rotate(0deg); opacity:0 }
  70% { transform:scale(1.05) rotate(-10deg); opacity:0.8 }
  100%{ transform:scale(1) rotate(0deg); opacity:1 }
}
@keyframes border-spin  { from{stroke-dashoffset:0} to{stroke-dashoffset:-62} }
@keyframes star-birth {
  0%  { transform:translate(0,0) scale(0); opacity:0 }
  35% { opacity:1 }
  100%{ transform:translate(var(--tx),var(--ty)) scale(1); opacity:var(--so,0.7) }
}
@keyframes star-twinkle { 0%,100%{opacity:var(--so,0.65)} 50%{opacity:1} }
@keyframes pulse-ring {
  0%  { transform:scale(0.8); opacity:0.65 }
  100%{ transform:scale(2.0); opacity:0 }
}
@keyframes float-y {
  0%,100%{ transform:translate(-50%,-50%) translateY(0) }
  50%    { transform:translate(-50%,-50%) translateY(-8px) }
}
@keyframes cloud-drift-l { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-8px)} }
@keyframes cloud-drift-r { 0%,100%{transform:translateX(0)} 50%{transform:translateX(8px)} }
@keyframes cloud-drift-u { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
@keyframes mist-pulse    { 0%,100%{opacity:0.4} 50%{opacity:0.9} }
@keyframes glow-pulse    { 0%,100%{opacity:0.12} 50%{opacity:0.32} }
</style>
</head>
<body>
<div class="phone" id="phone">




  <!-- ══════════════════════════════════
       LAYER 1 — Top Bar
       ══════════════════════════════════ -->
  <header id="topBar">
    <div class="top-bar__nav">
      <div class="top-bar__logo">
        <img src="images/top-bar-logo.svg" alt="玉山銀行">
      </div>
      <div class="top-bar__btn-group">
        <button class="top-bar__btn" aria-label="資訊">
          <img src="images/top-bar-btn-icon-info.svg" alt="資訊">
        </button>
        <button class="top-bar__btn" aria-label="關閉">

        </button>
      </div>
    </div>
    <div class="top-bar__announce">
      <p class="top-bar__announce-text">
        <span>✵ </span>看破詐諞，防詐資訊：【<a href="#" class="top-bar__announce-link">點我看</a>】
      </p>

  </header>


  <!-- ══════════════════════════════════
       LAYER 2 — Top Menu Overlay
       ══════════════════════════════════ -->

  <!-- ══════════════════════════════════

    <div class="top-menu__card">
      <div class="top-menu__list">

        <div class="top-menu__item top-menu__item--bordered">

       ══════════════════════════════════ -->

    <!-- X 關閉 -->
    <button class="login-close" id="loginCloseBtn" aria-label="關閉">

        <line x1="3" y1="3" x2="17" y2="17" stroke="#00A19B" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="17" y1="3" x2="3" y2="17" stroke="#00A19B" stroke-width="1.8" stroke-linecap="round"/>
      </svg> -->
    </button>

    <!-- 主體 -->
    <div class="login-invite__body">

      <p class="login-invite__title">
        親愛的顧客您好！<br>

      </p>

        <button class="login-btn login-btn--confirm" id="confirmBtn">確認</button>

  </div>

  <!-- ══════════════════════════════════

      <circle cx="58"  cy="440" r="0.6" fill="#00A19B" style="animation:star-twinkle 3.5s ease-in-out 1.0s infinite"/>

<script>
(function () {

  var phase = 0; // 0:splash 1:topMenu 2:login 3:sunrise

  var splash        = document.getElementById('splash');
  var topBar        = document.getElementById('topBar');
  var topMenuOverlay = document.getElementById('topMenuOverlay');
  var topMenu       = document.getElementById('topMenu');
  var topMenuClose  = document.getElementById('topMenuCloseBtn');
  var loginInvite   = document.getElementById('loginInvite');
  var loginCloseBtn = document.getElementById('loginCloseBtn');
  var cancelBtn     = document.getElementById('cancelBtn');
  var confirmBtn    = document.getElementById('confirmBtn');
  var pageOverlay   = document.getElementById('pageOverlay');

  /* ── Step 1: Splash → open top menu (auto or tap) ── */
  function advanceFromSplash() {
    if (phase !== 0) return;
    phase = 1;

    splash.style.opacity = '0';

    setTimeout(function () {
      splash.style.display = 'none';

      // 顯示 top bar
      topBar.classList.add('is-visible');

      // 開啟 top menu (略微延後確保 top bar 已渲染)
      setTimeout(function () {
        topMenu.classList.add('is-open');
        topMenu.setAttribute('aria-hidden', 'false');
        topMenuOverlay.classList.add('is-open');
        topMenuOverlay.setAttribute('aria-hidden', 'false');
      }, 80);
    }, 550);
  }

  // 動畫結束後 4 秒自動進入下一幕（最後動畫 tap-hint 在 5.7s 完成）
  setTimeout(advanceFromSplash, 7700);

  // 點擊可提前跳過
  splash.addEventListener('click', advanceFromSplash);

  /* ── Step 2: Close top menu → show login invite ── */
  topMenuClose.addEventListener('click', function () {
    if (phase !== 1) return;

    topMenu.classList.remove('is-open');
    topMenu.setAttribute('aria-hidden', 'true');
    topMenuOverlay.classList.remove('is-open');
    topMenuOverlay.setAttribute('aria-hidden', 'true');

    // 等關閉動畫結束後再顯示 login overlay
    setTimeout(function () {
      phase = 2;
      loginInvite.classList.add('is-visible');
      loginInvite.setAttribute('aria-hidden', 'false');
    }, 480);
  });

  /* ── Step 3: Any login button → fade out → redirect ── */
  function handleLoginAction() {
    if (phase !== 2) return;
    phase = 3;

    loginInvite.classList.remove('is-visible');
    loginInvite.setAttribute('aria-hidden', 'true');

    // 等遮罩淡出後直接跳轉
    setTimeout(function () {
      pageOverlay.classList.add('is-fading');
      setTimeout(function () {
        window.location.href = 'index-light.html';
      }, 720);
    }, 460);
  }

  loginCloseBtn.addEventListener('click', handleLoginAction);
  cancelBtn.addEventListener('click', handleLoginAction);
  confirmBtn.addEventListener('click', handleLoginAction);

})();
</script>
