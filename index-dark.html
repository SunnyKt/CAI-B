<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玉山 Yume — 夜間模式</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ============================================================
           夜間模式 Dark Mode Overrides
           ============================================================ */

        /* 整體背景 */
        body {
            background-color: #262626;
        }

        .page {
            background: #262626;
        }

        /* 頁面漸層取消 */
        .content-frame {
            background: transparent;
        }

        /* ── Hero Banner 底圖 ────────────────────── */

        /* ── Top Bar ────────────────────────────── */
        .top-bar__nav {
            background: #434343;
        }

        .top-bar__announce {
            background: #434343;
            border-top: 1px solid #5c5c5c;
            border-bottom: 1px solid #5c5c5c;
        }

        .top-bar__announce-text {
            color: #ffffff;
        }

        .top-bar__announce-link {
            color: #52d4ff;
        }
        .top-bar__btn-icon-wrapper img {
            width: 8rem;
            height: 8rem;
        }
  

        /* 日間模式切換按鈕特別標示 */
        .top-bar__btn--daymode {
            position: relative;
        }
        /* .top-bar__btn--daymode::after {
            content: '';
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #52d4ff;
        } */

        /* ── Hero Banner ────────────────────────── */
        .hero-banner {
            position: relative;
            overflow: hidden;
            border-radius: 2rem;
            background-image: url('images/banner_dark.png');
            background-size: cover;
            background-position: center top;
        }

        .hero-banner__bg {
            display: none; /* 不使用原本的 hero-bg.png */
        }

        /* 深色遮罩 — 左側加深讓文字可讀 */
        .hero-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 2;
            background: linear-gradient(
                90.35deg,
                rgba(7, 12, 12, 0.60) 40%,
                rgba(35, 94, 107, 0.30) 65%,
                rgba(47, 115, 132, 0.00) 88%
            );
            border-radius: inherit;
        }

        .hero-banner__card,
        .hero-banner__text,
        .hero-banner__subtext {
            position: relative;
            z-index: 3;
        }
        .hero-banner__card{
            background: none;
        }
        .hero-banner__text{
            top: -10.7rem;
        }
         .hero-banner__subtext{
            top: -10.5rem;
         }
        /* AI Avatar — 深色主題配色 */
        .hero-banner__card .hero-banner__ai circle:first-child {
            fill: rgba(0, 212, 206, 0.15);
        }

        /* 歡迎文字改為白色（深色模式） */
        .hero-banner__greeting,
        .hero-banner__name {
            color: #ffffff;
            text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.35);
        }

        .hero-banner__subtext p {
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.35);
        }

        /* ── Link Buttons (快捷連結) ─────────────── */
        .link-btns__item {
            background:#A2E1E1;
            color: rgba(0, 0, 0, 0.80);
            box-shadow: 0px 0px 8px 0px rgba(116, 157, 152, 0.4);
        }

        /* ── Chat Messages ───────────────────────── */
        .chat-msg__bubble--ai {
            background: #3a3a3a;
            color: #f0f0f0;
        }

        .chat-msg__bubble--user {
            background: #00A19B;
        }

        /* ── Bottom Menu ─────────────────────────── */
        .bottom-menu {
            background: #434343;
            border-top: 1px solid #6a6a6a;
            border-left: 1px solid #6a6a6a;
            border-right: 1px solid #6a6a6a;
        }

        .bottom-menu__input {
            background: #262626;
            border-color: #6d6d6d;
        }

        .bottom-menu__placeholder {
            color: #acacac;
        }

        /* Bottom menu icons — invert for dark bg */
        .bottom-menu__menu-icon-wrapper img {
            transform: rotate(90deg);
        } 

        /* ── Top Menu (資訊選單) ─────────────────── */
        .top-menu__card {
            background: #3a3a3a;
        }

        .top-menu__item-text {
            color: #e0e0e0;
        }

        .top-menu__link {
            color: #52d4ff;
        }

        .top-menu__privacy {
            color: #b0b0b0;
        }

        .top-menu-overlay {
            background: rgba(0, 0, 0, 0.6);
        }

        /* top-menu__close-btn icon — keep teal visible */
        .top-menu__close-btn img {
            filter: none;
        }

        /* ── 夜間/日間 切換按鈕標示 ──────────────── */
        .daymode-btn-label {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
    </style>
</head>
<body>

<!-- ============================== -->
<!-- [頁面] 夜間模式 Dark Mode       -->
<!-- ============================== -->
<div class="page">

    <!-- ============================== -->
    <!-- [區塊] Top Bar / 頂部導航列    -->
    <!-- ============================== -->
    <header class="top-bar">

        <!-- 主導航列 Nav -->
        <div class="top-bar__nav">
            <!-- Logo -->
            <div class="top-bar__logo">
                <img src="./images/logo_esun--dark.svg" alt="玉山銀行">
            </div>
            <!-- 右側按鈕群組 Button Group -->
            <div class="top-bar__btn-group">
                <!-- 日間模式切換按鈕 -->
                <button class="top-bar__btn top-bar__btn--daymode" id="daymodeBtn" aria-label="日間模式">
                    <span class="top-bar__btn-icon-wrapper">
                        <img src="./images/lightmode.svg" alt="日間模式">
                    </span>
                </button>
                <!-- 資訊按鈕 Info Button -->
                <button class="top-bar__btn" aria-label="資訊">
                    <img src="./images/ic_info-dark.svg" alt="資訊">
                </button>
                <!-- 關閉按鈕 Close Button -->
                <button class="top-bar__btn" aria-label="關閉" id="closeBtn">
                    <img src="./images/ic-closed-dark.svg" alt="關閉">
                </button>
            </div>
        </div>

        <!-- 公告列 Announcement Bar -->
        <div class="top-bar__announce">
            <p class="top-bar__announce-text">
                <span class="top-bar__announce-symbol">✵ </span>看破詐諞，防詐資訊：【<a href="#" class="top-bar__announce-link">點我看</a>】
            </p>
        </div>

    </header>

    <!-- ============================== -->
    <!-- [區塊] Top Menu Overlay / 遮罩 -->
    <!-- ============================== -->
    <div class="top-menu-overlay" id="topMenuOverlay" aria-hidden="true"></div>

    <!-- ============================== -->
    <!-- [區塊] Top Menu / 資訊選單     -->
    <!-- ============================== -->
    <div class="top-menu" id="topMenu" aria-hidden="true">

        <div class="top-menu__card">
            <div class="top-menu__list">

                <!-- 給小玉評分與鼓勵 -->
                <div class="top-menu__item">
                    <img class="top-menu__item-icon" src="./images/top-menu__item-icon-star.svg" alt="">
                    <span class="top-menu__item-text">給小玉評分與鼓勵</span>
                </div>

                <!-- English Service -->
                <div class="top-menu__item top-menu__item--bordered">
                    <img class="top-menu__item-icon" src="./images/top-menu__item-icon-eg.svg" alt="">
                    <span class="top-menu__item-text">English Service</span>
                </div>

                <!-- 顧客資料保密措施聲明 -->
                <div class="top-menu__item top-menu__item--bordered">
                    <img class="top-menu__item-icon" src="./images/top-menu__item-icon-cus.svg" alt="">
                    <span class="top-menu__item-text">顧客資料保密措施聲明</span>
                </div>
                <div class="top-menu__privacy">
                    <p>您好，為了保障您的權利，請詳細閱讀 【<a href="#" class="top-menu__link">個人資料運用法定告知事項</a>】與【<a href="#" class="top-menu__link">隱私權保護措施</a>】。如您已充分了解並同意前述告之事項，請繼續進行對談服務。</p>
                </div>

            </div>
        </div>

        <!-- 關閉按鈕 Close Button -->
        <button class="top-menu__close-btn" id="topMenuCloseBtn" aria-label="關閉資訊選單">
            <img class="top-menu__close-icon" src="./images/ic_close--green.svg" alt="關閉">
        </button>

    </div>
    <!-- /top-menu -->

    <!-- ============================== -->
    <!-- [區塊] Content Frame / 內容區  -->
    <!-- ============================== -->
    <main class="content-frame">

        <!-- 內容容器 Content Container -->
        <div class="content-frame__inner">

            <!-- 英雄區塊 Hero Group -->
            <div class="hero-group">

                <!-- 英雄橫幅 Hero Banner -->
                <div class="hero-banner">
                    <!-- 背景圖 Background Image -->
                    <div class="hero-banner__bg">
                        <img src="images/hero-bg.png" alt="">
                    </div>
                    <!-- 漸層卡片 Gradient Card -->
                    <div class="hero-banner__card">
                        <!-- AI Avatar SVG -->
                        <div class="hero-banner__ai">
                            <svg width="100%" height="100%" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="28" cy="28" r="27" fill="#00D4CE" opacity="0.12"></circle>
                                <circle cx="28" cy="28" r="27" fill="none" stroke="#00D4CE" stroke-width="1.0" stroke-dasharray="4 3" class="av-spin" style="transform-origin:28px 28px;"></circle>
                                <circle cx="28" cy="28" r="14" fill="none" stroke="#00D4CE" stroke-width="0.8" class="av-ring av-ring-idle1"></circle>
                                <circle cx="28" cy="28" r="14" fill="none" stroke="#00c4be" stroke-width="0.6" class="av-ring av-ring-idle2"></circle>
                                <circle cx="28" cy="28" r="14" fill="none" stroke="#00aaaa" stroke-width="0.5" class="av-ring av-ring-idle3"></circle>
                                <circle cx="28" cy="28" r="18" fill="#00D4CE" class="av-scale-idle av-op-idle" style="--op-lo:0.06;--op-hi:0.20"></circle>
                                <circle cx="28" cy="28" r="11" fill="#00D4CE" class="av-scale-idle av-op-idle" style="--op-lo:0.12;--op-hi:0.30"></circle>
                                <circle cx="28" cy="28" r="6"  fill="#00D4CE" class="av-scale-idle av-op-idle" style="--op-lo:0.28;--op-hi:0.55"></circle>
                                <circle cx="28" cy="28" r="3"  fill="#00D4CE" class="av-scale-idle av-core-norm"></circle>
                                <circle cx="28" cy="28" r="1.3" fill="#85FFFA"></circle>
                                <circle cx="11" cy="10" r="1.2" fill="#00D4CE" style="--tw:2.4s;--td:0s"   class="av-twinkle"></circle>
                                <circle cx="45" cy="8"  r="0.9" fill="#00c4be" style="--tw:3.0s;--td:.6s"  class="av-twinkle"></circle>
                                <circle cx="48" cy="40" r="1.1" fill="#00D4CE" style="--tw:1.9s;--td:1.2s" class="av-twinkle"></circle>
                                <circle cx="8"  cy="42" r="0.9" fill="#00c4be" style="--tw:2.7s;--td:.3s"  class="av-twinkle"></circle>
                                <circle cx="33" cy="4"  r="0.8" fill="#00D4CE" style="--tw:3.3s;--td:.9s"  class="av-twinkle"></circle>
                            </svg>
                        </div>
                    </div>
                    <!-- 歡迎文字 Welcome Text -->
                    <div class="hero-banner__text">
                        <p class="hero-banner__greeting">你好！</p>
                        <p class="hero-banner__name">我是玉山 Yume ✦</p>
                    </div>
                    <!-- 副文字 Sub Text -->
                    <div class="hero-banner__subtext">
                        <p>你已從 LINE 登入</p>
                        <p>有什麼可以幫你的嗎？</p>
                    </div>
                </div>

                <!-- 快捷連結按鈕群 Link Buttons Group -->
                <div class="link-btns">
                    <button class="link-btns__item">查詢帳單/明細</button>
                    <button class="link-btns__item">消費問題</button>
                    <button class="link-btns__item">旅遊滿額贈</button>
                    <button class="link-btns__item">熱門服務</button>
                    <button class="link-btns__item">銀行服務</button>
                </div>

            </div>
            <!-- /hero-group -->

            <!-- 聊天互動區 Chat Group -->
            <div class="chat-group">
                <!-- AI Message 1 -->
                <div class="chat-msg chat-msg--ai">
                    <div class="chat-msg__avatar">
                        <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="12" r="11" fill="#00D4CE" opacity="0.15"></circle>
                            <circle cx="12" cy="12" r="11" fill="none" stroke="#00D4CE" stroke-width="1.2" stroke-dasharray="3 2" class="av-spin" style="transform-origin:12px 12px;"></circle>
                            <circle cx="12" cy="12" r="7" fill="#00D4CE" class="av-scale-idle av-op-idle" style="--op-lo:0.08;--op-hi:0.22"></circle>
                            <circle cx="12" cy="12" r="4.5" fill="#00D4CE" class="av-scale-idle av-op-idle" style="--op-lo:0.18;--op-hi:0.40"></circle>
                            <circle cx="12" cy="12" r="2.2" fill="#00D4CE" class="av-scale-idle av-core-norm"></circle>
                            <circle cx="12" cy="12" r="1.0" fill="#85FFFA"></circle>
                            <circle cx="5" cy="5" r="0.7" fill="#00D4CE" style="--tw:2.4s;--td:0s" class="av-twinkle"></circle>
                            <circle cx="19" cy="4" r="0.5" fill="#00c4be" style="--tw:3.0s;--td:.6s" class="av-twinkle"></circle>
                        </svg>
                    </div>
                    <div class="chat-msg__content">
                        <div class="chat-msg__bubble chat-msg__bubble--ai">
                            <p>嗨！今天有什麼我能幫忙的嗎？</p>
                        </div>
                    </div>
                </div>
            </div>
            <!-- /chat-group -->

        </div>
        <!-- /content-frame__inner -->

    </main>
    <!-- /content-frame -->

    <!-- ============================== -->
    <!-- [區塊] Bottom Group / 底部區   -->
    <!-- ============================== -->
    <div class="btm-group">

        <!-- 底部選單列 Bottom Menu Bar -->
        <div class="bottom-menu">

            <!-- 左側功能按鈕群 Left Function Buttons -->
            <div class="bottom-menu__btn-group">
                <button class="bottom-menu__menu-btn" aria-label="選單">
                    <div class="bottom-menu__menu-icon-wrapper">
                        <img src="./images/bottom-menu__icon-dark.svg" alt="選單">
                    </div>
                </button>
                <button class="bottom-menu__icon-btn" aria-label="排序">
                    <img src="./images/bottom-menu__sort-btn-dark.svg" alt="排序">
                </button>
                <button class="bottom-menu__icon-btn" aria-label="收藏">
                    <img src="images/bottom-menu__star-btn-dark.svg" alt="收藏">
                </button>
            </div>

            <!-- 輸入框 Input Field -->
            <button class="bottom-menu__input" aria-label="輸入文字">
                <span class="bottom-menu__placeholder">請輸入文字</span>
            </button>

            <!-- 送出按鈕 Send Button -->
            <button class="bottom-menu__send-btn" aria-label="送出">
                <div class="bottom-menu__send-icon">
                    <img src="./images/bottom-menu__btn-send-dark.svg" alt="送出">
                </div>
            </button>

        </div>
        <!-- /bottom-menu -->

    </div>
    <!-- /btm-group -->

</div>
<!-- /page -->

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
$(function() {
    // ── 日間模式切換 ──────────────────────────
    $('#daymodeBtn').on('click', function() {
        window.location.href = 'index-light.html';
    });

    // ── 關閉 → 回到 intro ─────────────────────
    $('#closeBtn').on('click', function() {
        window.location.href = 'index.html';
    });

    // ── Top Menu ──────────────────────────────
    var $topMenu    = $('#topMenu');
    var $topOverlay = $('#topMenuOverlay');
    var $closeBtn   = $('#topMenuCloseBtn');

    function openTopMenu() {
        $topMenu.addClass('is-open').attr('aria-hidden', 'false');
        $topOverlay.addClass('is-open').attr('aria-hidden', 'false');
    }

    function closeTopMenu() {
        $topMenu.removeClass('is-open').attr('aria-hidden', 'true');
        $topOverlay.removeClass('is-open').attr('aria-hidden', 'true');
    }

    // 從 intro 切換過來時自動打開選單
    if (sessionStorage.getItem('fromIntro') === '1') {
        sessionStorage.removeItem('fromIntro');
        setTimeout(openTopMenu, 120);
    }

    $closeBtn.on('click', closeTopMenu);
    $topOverlay.on('click', closeTopMenu);
});
</script>
</body>
</html>
